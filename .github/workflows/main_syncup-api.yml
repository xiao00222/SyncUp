name: Build and deploy .NET API to Azure Web App - syncup-api

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'syncup-api'
  DOTNET_VERSION: '9.x'
  NODE_VERSION: '20.x' # Added Node.js version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. SETUP NODE & BUILD FRONTEND
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        working-directory: ./client
        run: npm install

      - name: Build React frontend
        working-directory: ./client
        run: npm run build
      # (Because your vite.config.ts pushes the build to ../API/wwwroot, 
      # the files will automatically be ready for the .NET publish step below!)

      # 2. SETUP .NET & BUILD BACKEND
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SyncUp.sln

      - name: Build Solution
        run: dotnet build SyncUp.sln --configuration Release --no-restore

      - name: Publish API Project
        run: dotnet publish API/API.csproj -c Release -o ./published --no-build

      # 3. DEPLOY TO AZURE
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./published
